<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacob White — Sports Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --text: #d8d8d8;
            --muted: #4a4a4a;
            --white: #ffffff;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            overflow-x: hidden;
        }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 200;
            padding: 30px 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.5s ease, padding 0.4s ease, backdrop-filter 0.5s ease;
        }

        nav.scrolled {
            background: rgba(10, 10, 10, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 18px 52px;
            border-bottom: 1px solid rgba(255,255,255,0.045);
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.25s;
        }

        .nav-links a:hover { color: var(--white); }

        /* ─── HERO ─── */
        #hero {
            position: relative;
            height: 100vh;
            min-height: 620px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            will-change: transform;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                rgba(10,10,10,0.96) 0%,
                rgba(10,10,10,0.5)  35%,
                rgba(10,10,10,0.18) 65%,
                rgba(10,10,10,0.35) 100%
            );
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 0 52px 80px;
        }

        .hero-eyebrow {
            font-size: 0.63rem;
            letter-spacing: 0.38em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.38);
            margin-bottom: 18px;
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
        }

        .hero-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: clamp(4.5rem, 10.5vw, 10rem);
            line-height: 0.88;
            letter-spacing: -0.015em;
            color: var(--white);
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 1.1s ease 0s, transform 1.1s ease 0s;
        }

        .hero-name span { display: block; }

        .hero-tagline {
            font-size: 0.68rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-top: 28px;
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.9s ease 0.45s, transform 0.9s ease 0.45s;
        }

        .hero-content.reveal .hero-eyebrow,
        .hero-content.reveal .hero-name,
        .hero-content.reveal .hero-tagline {
            opacity: 1;
            transform: translateY(0);
        }

        /* scroll cue */
        .scroll-cue {
            position: absolute;
            bottom: 36px;
            right: 52px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 1s ease 1.1s;
        }

        .scroll-cue.reveal { opacity: 1; }

        .scroll-cue-label {
            font-size: 0.58rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            writing-mode: vertical-rl;
        }

        .scroll-cue-line {
            width: 1px;
            height: 52px;
            background: rgba(255,255,255,0.12);
            overflow: hidden;
            position: relative;
        }

        .scroll-cue-line::after {
            content: '';
            position: absolute;
            inset: 0;
            width: 100%;
            background: rgba(255,255,255,0.55);
            animation: drip 2.2s ease-in-out infinite;
        }

        @keyframes drip {
            0%   { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }

        /* ─── GALLERY ─── */
        #gallery {
            padding: 120px 52px 100px;
        }

        .section-meta {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 56px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: clamp(2.2rem, 4.5vw, 3.8rem);
            color: var(--white);
            letter-spacing: -0.01em;
        }

        .section-rule {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.07);
            max-width: 240px;
        }

        .section-count {
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* masonry via CSS columns */
        .masonry {
            columns: 3;
            column-gap: 10px;
        }

        .m-item {
            break-inside: avoid;
            margin-bottom: 10px;
            overflow: hidden;
            cursor: zoom-in;
            position: relative;
            background: #111;
        }

        .m-item img {
            width: 100%;
            display: block;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.75s ease, transform 0.75s ease, filter 0.35s ease, transform 0.35s ease;
            filter: brightness(0.92);
            will-change: opacity, transform;
        }

        .m-item img.fadein {
            opacity: 1;
            transform: translateY(0);
        }

        .m-item:hover img {
            filter: brightness(1.06);
            transform: scale(1.015);
        }

        /* ─── CONTACT ─── */
        #contact {
            padding: 120px 52px 80px;
            border-top: 1px solid rgba(255,255,255,0.055);
        }

        .contact-wrap {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 80px;
            max-width: 880px;
        }

        .contact-left h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: clamp(2.2rem, 4.5vw, 3.8rem);
            line-height: 1;
            color: var(--white);
            margin-bottom: 20px;
        }

        .contact-left p {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.85;
            margin-bottom: 36px;
        }

        .ig-link {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            color: var(--white);
            text-decoration: none;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            transition: border-color 0.25s, color 0.25s;
        }

        .ig-link:hover {
            border-color: var(--white);
        }

        .ig-link svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .field label {
            display: block;
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
        }

        .field input,
        .field textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            color: var(--white);
            padding: 12px 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.83rem;
            outline: none;
            resize: none;
            transition: border-color 0.25s, background 0.25s;
            -webkit-appearance: none;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.05);
        }

        .field input::placeholder,
        .field textarea::placeholder { color: rgba(255,255,255,0.12); }

        .btn-send {
            align-self: flex-start;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.8);
            padding: 13px 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.67rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s, color 0.25s;
        }

        .btn-send:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.38);
            color: var(--white);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* ─── FOOTER ─── */
        footer {
            padding: 28px 52px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        footer p {
            font-size: 0.62rem;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        /* ─── LIGHTBOX ─── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(6, 6, 6, 0.97);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #lightbox.open {
            opacity: 1;
            pointer-events: all;
        }

        .lb-img-wrap {
            max-width: 92vw;
            max-height: 90vh;
        }

        .lb-img-wrap img {
            max-width: 92vw;
            max-height: 88vh;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 0.28s ease;
        }

        .lb-img-wrap img.show { opacity: 1; }

        .lb-close {
            position: fixed;
            top: 26px;
            right: 34px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
            z-index: 501;
        }

        .lb-close:hover { color: var(--white); }
        .lb-close svg { width: 22px; height: 22px; display: block; }

        .lb-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.28);
            cursor: pointer;
            padding: 18px 22px;
            transition: color 0.2s;
            z-index: 501;
        }

        .lb-btn:hover { color: rgba(255,255,255,0.85); }
        .lb-btn svg { width: 26px; height: 26px; display: block; }
        #lbPrev { left: 12px; }
        #lbNext { right: 12px; }

        .lb-count {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            color: rgba(255,255,255,0.25);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1024px) {
            .masonry { columns: 2; }
        }

        @media (max-width: 768px) {
            nav, nav.scrolled { padding: 20px 24px; }
            .nav-links { display: none; }
            .hero-content { padding: 0 24px 64px; }
            .scroll-cue { right: 24px; bottom: 28px; }
            #gallery { padding: 80px 24px 80px; }
            .masonry { columns: 1; }
            .section-meta { margin-bottom: 36px; }
            #contact { padding: 80px 24px 60px; }
            .contact-wrap { grid-template-columns: 1fr; gap: 48px; }
            footer { padding: 24px; flex-direction: column; gap: 10px; text-align: center; }
            .lb-btn { padding: 12px 14px; }
            #lbPrev { left: 4px; }
            #lbNext { right: 4px; }
        }

        @media (max-width: 480px) {
            .hero-name { font-size: clamp(3.2rem, 15vw, 5rem); }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav id="nav">
        <a href="#hero" class="nav-logo">Jacob White</a>
        <ul class="nav-links">
            <li><a href="#gallery">Work</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section id="hero">
        <img class="hero-bg" src="compressed/1J4A6317.jpg" alt="" role="presentation" fetchpriority="high">
        <div class="hero-overlay"></div>
        <div class="hero-content" id="heroContent">
            <p class="hero-eyebrow">Sports Photography</p>
            <h1 class="hero-name">
                <span>Jacob</span>
                <span>White</span>
            </h1>
            <p class="hero-tagline">Capturing the moment</p>
        </div>
        <div class="scroll-cue" id="scrollCue">
            <span class="scroll-cue-label">Scroll</span>
            <div class="scroll-cue-line"></div>
        </div>
    </section>

    <!-- GALLERY -->
    <section id="gallery">
        <div class="section-meta">
            <h2 class="section-title">Work</h2>
            <div class="section-rule"></div>
            <span class="section-count">14 images</span>
        </div>
        <div class="masonry" id="masonry">
            <div class="m-item" data-i="0">
                <img src="compressed/1J4A6317.jpg" alt="Player leaping for ball" loading="lazy">
            </div>
            <div class="m-item" data-i="1">
                <img src="compressed/1J4A5112.jpg" alt="Harlequins number 10" loading="lazy">
            </div>
            <div class="m-item" data-i="2">
                <img src="compressed/1J4A7819.jpg" alt="Worthing FC portrait, rain" loading="lazy">
            </div>
            <div class="m-item" data-i="3">
                <img src="compressed/1J4A6611.jpg" alt="Tackle evasion, sunny" loading="lazy">
            </div>
            <div class="m-item" data-i="4">
                <img src="compressed/1J4A5572.jpg" alt="Harlequins Champions Cup" loading="lazy">
            </div>
            <div class="m-item" data-i="5">

            <div class="m-item" data-i="6">

            <div class="m-item" data-i="7">

    <!-- CONTACT -->
    <section id="contact">
        <div class="contact-wrap">
            <div class="contact-left">
                <h2>Get in<br>touch</h2>
                <p>Available for sports events, editorial commissions, and club photography across the UK.</p>
                <a href="https://www.instagram.com/jw_photos21" target="_blank" rel="noopener noreferrer" class="ig-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5"/>
                        <circle cx="12" cy="12" r="4"/>
                        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                    </svg>
                    @jw_photos21
                </a>
            </div>
            <div class="contact-right">
                <form class="contact-form" id="contactForm">
                    <div class="field">
                        <label for="fname">Name</label>
                        <input type="text" id="fname" name="name" placeholder="Your name" autocomplete="name">
                    </div>

                        <label for="femail">Email</label>

                    </div>

                        <label for="fmsg">Message</label>
                        <textarea id="fmsg" name="message" rows="4" placeholder="Tell me about your project…"></textarea>

    <footer>
        <p>© 2026 Jacob White Photography</p>
        <p>All rights reserved</p>
    </footer>

    <!-- LIGHTBOX -->
    <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
        <button class="lb-close" id="lbClose" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <button class="lb-btn" id="lbPrev" aria-label="Previous image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <div class="lb-img-wrap">
            <img id="lbImg" src="" alt="">
        </div>
        <button class="lb-btn" id="lbNext" aria-label="Next image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
        <div class="lb-count" id="lbCount"></div>
    </div>

    <script>
    (() => {
        'use strict';

        // ── Hero entrance ──
        const heroContent = document.getElementById('heroContent');
        const scrollCue   = document.getElementById('scrollCue');

        window.addEventListener('load', () => {
            heroContent.classList.add('reveal');
            scrollCue.classList.add('reveal');
        });

        // ── Nav on scroll ──
        const nav = document.getElementById('nav');
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(() => {
                    nav.classList.toggle('scrolled', window.scrollY > 50);
                    // fade out scroll cue
                    scrollCue.style.opacity = window.scrollY > 120 ? '0' : '';
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });

        // ── Gallery image fade-in ──
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const img = entry.target;
                const col = parseInt(img.closest('.m-item').dataset.i) % 3;
                setTimeout(() => img.classList.add('fadein'), col * 70);
                observer.unobserve(img);
            });
        }, { threshold: 0.05, rootMargin: '0px 0px 0px 0px' });

        document.querySelectorAll('.m-item img').forEach(img => {
            // Fallback: if image loads but observer never fired, show it anyway
            img.addEventListener('load', () => {
                setTimeout(() => img.classList.add('fadein'), 100);
            });
            if (img.complete && img.naturalWidth) img.classList.add('fadein');
            observer.observe(img);
        });

        // ── Lightbox ──
        const photos = [
            'compressed/1J4A6317.jpg',
            'compressed/1J4A5112.jpg',
            'compressed/1J4A7819.jpg',
            'compressed/1J4A6611.jpg',
            'compressed/1J4A5572.jpg',
            'compressed/1J4A6263.jpg',
            'compressed/1J4A9011.jpg',
            'compressed/1J4A6509.jpg',
            'compressed/1J4A0723.jpg',
            'compressed/IMG_0220.jpg',
            'compressed/1J4A6032.jpg',
            'compressed/1J4A6565.jpg',
            'compressed/IMG_5138.jpg',
            'compressed/1J4A7981.jpg',
        ];

        const lb      = document.getElementById('lightbox');
        const lbImg   = document.getElementById('lbImg');
        const lbCount = document.getElementById('lbCount');
        let current   = 0;

        function openLb(i) {
            current = i;
            lb.classList.add('open');
            document.body.style.overflow = 'hidden';
            setImage(i);
        }

        function closeLb() {
            lb.classList.remove('open');
            document.body.style.overflow = '';
            lbImg.classList.remove('show');
        }

        function setImage(i) {
            lbImg.classList.remove('show');
            lbImg.src = photos[i];
            lbImg.onload = () => lbImg.classList.add('show');
            if (lbImg.complete && lbImg.naturalWidth) lbImg.classList.add('show');
            lbCount.textContent = `${i + 1} / ${photos.length}`;
        }

        function step(dir) {
            current = (current + dir + photos.length) % photos.length;
            setImage(current);
        }

        document.querySelectorAll('.m-item').forEach(item => {
            item.addEventListener('click', () => openLb(+item.dataset.i));
        });

        document.getElementById('lbClose').addEventListener('click', closeLb);
        document.getElementById('lbPrev').addEventListener('click', () => step(-1));
        document.getElementById('lbNext').addEventListener('click', () => step(1));

        lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

        document.addEventListener('keydown', e => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape')     closeLb();
            if (e.key === 'ArrowLeft')  step(-1);
            if (e.key === 'ArrowRight') step(1);
        });

        // touch swipe
        let tx = 0;
        lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', e => {
            const d = tx - e.changedTouches[0].clientX;
            if (Math.abs(d) > 48) step(d > 0 ? 1 : -1);
        });

        // ── Contact form ──
        document.getElementById('contactForm').addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('btnSend');
            btn.textContent = 'Sent ✓';
            btn.disabled = true;
            e.target.reset();
        });
    })();
    </script>
</body>
</html>
